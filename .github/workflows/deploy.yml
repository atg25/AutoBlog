name: Deploy to GitHub Pages (redirect to Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create redirect artifact
        run: |
          set -euo pipefail
          mkdir -p out
          if [ -n "${{ secrets.VERCEL_URL }}" ]; then
            target="${{ secrets.VERCEL_URL }}"
          else
            target="https://your-vercel-domain.example"
          fi
          cat > out/index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0;url=${target}" />
            <meta name="robots" content="noindex" />
            <title>Redirecting…</title>
            <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}a{color:#c8511a}</style>
          </head>
          <body>
            <div>
              <p>Redirecting to <a href="${target}">${target}</a></p>
            </div>
          </body>
          </html>
          EOF
          cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish-redirect
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
